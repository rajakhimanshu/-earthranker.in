<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#0D0D1A"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C47FF"/>
      <stop offset="100%" style="stop-color:#FF6B6B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(108,71,255,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Center Content -->
  <g transform="translate(600, 315)">
    <!-- Logo Icon -->
    <rect x="-60" y="-120" width="120" height="120" rx="30" fill="url(#textGrad)"/>
    <text x="0" y="-40" font-family="system-ui, sans-serif" font-size="70" font-weight="900" text-anchor="middle" fill="white">U</text>
    
    <!-- Title -->
    <text x="0" y="60" font-family="system-ui, sans-serif" font-size="72" font-weight="800" text-anchor="middle" fill="white">
      Unique<tspan fill="#6C47FF">.com</tspan>
    </text>

    <!-- Subtitle -->
    <text x="0" y="140" font-family="system-ui, sans-serif" font-size="36" font-weight="500" text-anchor="middle" fill="#A0AEC0">
      How Rare Are You?
    </text>
  </g>
</svg>
