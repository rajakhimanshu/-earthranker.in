<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C47FF"/>
      <stop offset="100%" style="stop-color:#FF6B6B"/>
    </linearGradient>
    <linearGradient id="dot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#6C47FF"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- U letter -->
  <text x="96" y="128" font-family="Arial, sans-serif" font-size="110" font-weight="900"
        text-anchor="middle" fill="white" opacity="0.95">U</text>
  <!-- Accent dot -->
  <circle cx="142" cy="42" r="18" fill="url(#dot)" opacity="0.9"/>
</svg>
